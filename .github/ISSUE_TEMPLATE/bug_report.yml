name: Bug Report
description: Report a problem with the website
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Browser / Device
      placeholder: e.g. Chrome 126 on Windows 11, Safari on iPhone 15
    validations:
      required: false
