name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No package.json / dependencies exist yet. Lint tools (html-validate,
      # stylelint, eslint) are invoked on demand via `npx` in ci.yml. Once a
      # package manager is introduced, replace this with a real install step
      # (e.g. `npm ci`) matching ci.yml.
